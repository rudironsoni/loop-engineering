name: Release loop-audit

on:
  push:
    tags:
      - 'loop-audit-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. loop-audit-v1.4.2)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: tools/loop-audit/package-lock.json

      - name: Ensure npm supports trusted publishing (OIDC)
        run: |
          npm install -g npm@latest
          npm install -g sigstore

      - name: Install, build, test
        working-directory: tools/loop-audit
        run: |
          # Build monorepo sibling first
          (cd ../readiness-core && npm ci && npm run build)
          npm ci
          npm run build
          npm test

      - name: Publish to npm
        working-directory: tools/loop-audit
        run: |
          # Rewrite to registry version for publish
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            p.dependencies['@cobusgreyling/readiness-core'] = '^1.0.0';
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}